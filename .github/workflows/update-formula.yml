name: Update Formula

on:
  repository_dispatch:
    types: [update-takeout-photos]

jobs:
  update:
    name: Update takeout-photos formula
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update formula version and SHA256
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA256: ${{ github.event.client_payload.sha256 }}
        run: |
          FORMULA="Formula/takeout-photos.rb"

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"

          # Update SHA256
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" "$FORMULA"

          echo "Updated $FORMULA to v${VERSION} (${SHA256:0:16}...)"
          cat "$FORMULA"

      - name: Commit and push
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/takeout-photos.rb
          git diff --staged --quiet || git commit -m "chore: update takeout-photos to v${VERSION}"
          git push
